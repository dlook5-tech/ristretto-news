<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ristretto News — Pure Views</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#0a0a0a; color:#ddd; margin:0; padding:20px; line-height:1.5; }
    h1 { text-align:center; margin:30px 0; }
    .story { background:#1f1f1f; padding:20px; margin:15px 0; border-radius:12px; cursor:pointer; }
    .story.has-persp { cursor:default; }
    .story.has-persp:hover { background:#1f1f1f; }
    .story:hover { background:#2a2a2a; }
    .headline { font-size:1.2em; font-weight:500; }
    /* Matches eXpressO's existing time-ago badge style exactly. */
    .badge { font-size:0.7rem; color:#aaa; margin-left:8px; font-weight:400; }
    .perspective { background:#262626; padding:12px 14px; margin:10px 0 0 0; border-radius:8px; cursor:pointer; border-left:3px solid #444; }
    .perspective:hover { background:#2e2e2e; }
    .perspective .label { font-size:0.75em; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:4px; font-weight:600; }
    .perspective .body { color:#ddd; font-size:0.95em; }
    .perspective.conservative { border-left-color:#c1432e; }
    .perspective.conservative .label { color:#e07360; }
    .perspective.independent { border-left-color:#7a7a7a; }
    .perspective.independent .label { color:#aaa; }
    .perspective.democrat { border-left-color:#3673a8; }
    .perspective.democrat .label { color:#5e9bd4; }
  </style>
</head>
<body>
  <h1>Ristretto News — Pure Views</h1>
  <div id="content"></div>

  <script>
    // Build a "Xh ago • 4.2M views" badge in eXpressO's exact format.
    // Same span style as eXpressO buildPostedTag — light grey, 0.7rem, subtle.
    function buildBadge(post) {
      // Time from snowflake ID
      let label = '';
      const m = ((post && post.url) || '').match(/\/status\/(\d+)/);
      if (m) {
        const ts = Number(BigInt(m[1]) >> 22n) + 1288834974657;
        const min = Math.round((Date.now() - ts) / 60000);
        if (min < 1) label = 'just now';
        else if (min < 60) label = min + 'm ago';
        else if (min < 60 * 24) label = Math.round(min / 60) + 'h ago';
        else label = Math.round(min / (60 * 24)) + 'd ago';
      }
      // Views from integer field; take max across top-level + perspectives
      let v = 0;
      if (post && typeof post.views === 'number') v = Math.max(v, post.views);
      if (post && Array.isArray(post.perspectives)) {
        for (const p of post.perspectives) {
          if (typeof p.views === 'number') v = Math.max(v, p.views);
        }
      }
      let viewsStr = '';
      if (v > 0) {
        let vs;
        if (v >= 1e9) vs = (v/1e9).toFixed(1).replace(/\.0$/,'') + 'B';
        else if (v >= 1e6) vs = (v/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
        else if (v >= 1e3) vs = Math.round(v/1e3) + 'K';
        else vs = String(v);
        viewsStr = ' • ' + vs + ' views';
      }
      const text = label + viewsStr;
      return text ? `<span class="badge">${text}</span>` : '';
    }

    async function loadStories() {
      try {
        const res = await fetch('stories.json?' + Date.now());
        const data = await res.json();
        let html = '';
        const esc = (t) => String(t == null ? '' : t).replace(/'/g, "\\'");
        for (let [tab, sec] of Object.entries(data.stories || {})) {
          html += `<h2 style="margin:30px 0 10px;">${tab.toUpperCase()}</h2>`;
          for (let s of sec.stories || []) {
            const persps = Array.isArray(s.perspectives) ? s.perspectives : [];
            if (persps.length) {
              const perspBlocks = persps.map(p => {
                const cls = (p.label || '').toLowerCase();
                return `<div class="perspective ${cls}" onclick="event.stopPropagation(); window.open('${esc(p.url)}','_blank')">
                          <div class="label">${p.label || ''}</div>
                          <div class="body">${p.body || p.headline || ''}${buildBadge(p)}</div>
                        </div>`;
              }).join('');
              html += `
                <div class="story has-persp">
                  <div class="headline">${s.headline || 'No title'}${buildBadge(s)}</div>
                  ${perspBlocks}
                </div>`;
            } else {
              html += `
                <div class="story" onclick="window.open('${esc(s.url)}','_blank')">
                  <div class="headline">${s.headline || s.body || 'No title'}${buildBadge(s)}</div>
                </div>`;
            }
          }
        }
        document.getElementById('content').innerHTML = html;
      } catch(e) { console.error(e); }
    }
    loadStories();
    setInterval(loadStories, 300000); // 5 minutes
  </script>
</body>
</html>
